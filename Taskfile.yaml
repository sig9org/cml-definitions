# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

dotenv: [".env"]

vars:
  ARCH: amd64
  UBUNTU22: "20260711"
  UBUNTU24: "20260705"
  UBUNTU26: "20260717"
  ZEBRA_VERSION: "26.7.7"

tasks:
  default:
    silent: true
    cmds:
      - task --list

  _time-start:
    internal: true
    cmds:
      - python3 -c 'import time; print(int(time.time() * 1000))' > .task_start_time

  _time-end:
    internal: true
    cmds:
      - |
        start=$(cat .task_start_time 2>/dev/null || echo 0)
        end=$(python3 -c 'import time; print(int(time.time() * 1000))')
        elapsed_ms=$((end - start))
        python3 -c "g='\033[32m'; n='\033[0m'; p='======================================== '; ms=$elapsed_ms; s=ms//1000; r=ms%1000; print(f'{g}{p}Elapsed: {s} second{\"s\" if s!=1 else \"\"} {r} millisecond{\"s\" if r!=1 else \"\"}{n}') if s>0 else print(f'{g}{p}Elapsed: {r} millisecond{\"s\" if r!=1 else \"\"}{n}')"
        rm -f .task_start_time

  _clean:
    aliases: [c]
    desc: Clean up
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - task: _clean-mac

  _clean-mac:
    internal: true
    platforms: [darwin]
    cmds:
      - find . -type d -name ".terraform" -prune -exec rm -rf {} +
      - find . -name ".DS_Store" -delete
      - find . -name ".terraform.lock.hcl" -delete
      - find . -name "terraform.tfstate" -delete
      - find . -name "terraform.tfstate.backup" -delete

  _license:
    desc: "Work with product licensing"
    cmds:
      - uv run cml license show

  _ls:
    aliases: [l]
    desc: "Lists running labs and optionally those in the cache"
    cmds:
      - uv run cml ls

  _upgrade:
    aliases: [u]
    desc: Upgrade
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - uv sync --upgrade

  upload-iamge:
    internal: true
    cmds:
      - uv run cml definitions images import image-file -f {{.IMG_FILE}}
      - uv run cml definitions images import definition -f {{.IMG_DEF}}

  # A10 vThunder

  a10vthunder:
    desc: "A10 vThunder (Node)"
    cmds:
      - uv run cml definitions nodes import -f definitions/a10vthunder/node/a10vthunder.yaml

  a10vthunder-image:
    internal: true
    cmds:
      - task: upload-iamge
        vars:
          IMG_FILE: "{{.DOC_ROOT}}/a10vthunder/vThunder_{{.IMG_VER}}.qcow2"
          IMG_DEF: "definitions/a10vthunder/image/a10vthunder_{{.IMG_VER}}.yaml"

  a10vthunder_6_0_6_83:
    desc: "A10 vThunder 6.0.6.83"
    cmds:
