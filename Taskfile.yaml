# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

dotenv: [".env"]

tasks:
  default:
    cmds:
      - task --list

  _clean:
    aliases: [c]
    desc: Clean up
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - task: _clean-mac

  _clean-mac:
    internal: true
    platforms: [darwin]
    cmds:
      - find . -type d -name ".terraform" -prune -exec rm -rf {} +
      - find . -name ".DS_Store" -delete
      - find . -name ".terraform.lock.hcl" -delete
      - find . -name "terraform.tfstate" -delete
      - find . -name "terraform.tfstate.backup" -delete

  _license:
    desc: "Work with product licensing"
    cmds:
      - uv run cml license show

  _ls:
    aliases: [l]
    desc: "Lists running labs and optionally those in the cache"
    cmds:
      - uv run cml ls

  upload-iamge:
    internal: true
    cmds:
      - uv run cml definitions images import image-file -f {{.IMG_FILE}}
      - uv run cml definitions images import definition -f {{.IMG_DEF}}

  fortigate:
    desc: "Import FortiGate node definition"
    cmds:
      - uv run cml definitions nodes import -f definitions/fortigate/node/fortigate.yaml

  fortigate-image:
    internal: true
    cmds:
      - task: upload-iamge
        vars:
          IMG_FILE: "{{.DOC_ROOT}}fortinet/fortigate/fortios-{{.IMG_VER}}.qcow2"
          IMG_DEF: "definitions/fortigate/image/fortigate-{{.IMG_VER}}.yaml"

  fortigate-7.0.1:
    desc: "Import FortiGate 7.0.1 image"
    cmds:
      - task: fortigate-image
        vars:
          IMG_VER: "7.0.1"

  fortigate-7.0.6:
    desc: "Import FortiGate 7.0.6 image"
    cmds:
      - task: fortigate-image
        vars:
          IMG_VER: "7.0.6"

  fortigate-7.0.19:
    desc: "Import FortiGate 7.0.19 image"
    cmds:
      - task: fortigate-image
        vars:
          IMG_VER: "7.0.19"
